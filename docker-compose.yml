version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nyayamitra_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nyayamitra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d nyayamitra" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nyayamitra_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/nyayamitra
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount the FAISS knowledge bases so they persist without rebuilding the container
      - ./backend/app/rag/data:/app/app/rag/data
      - ./backend/app/data:/app/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nyayamitra_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
